name: BeltandHoseLog
options:
  bundleIdPrefix: com.shimondeitel.belthoselog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  BeltandHoseLog:
    type: application
    platform: iOS
    sources:
      - path: BeltandHoseLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.belthoselog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: BeltandHoseLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BeltandHoseLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BeltandHoseLogTests
      - path: BeltandHoseLog.storekit
    dependencies:
      - target: BeltandHoseLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.belthoselog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BeltandHoseLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BeltandHoseLogUITests
    dependencies:
      - target: BeltandHoseLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.belthoselog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  BeltandHoseLog:
    build:
      targets:
        BeltandHoseLog: all
        BeltandHoseLogTests: [test]
        BeltandHoseLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: BeltandHoseLog.storekit
    test:
      config: Debug
      storeKitConfiguration: BeltandHoseLog.storekit
      targets:
        - BeltandHoseLogTests
        - BeltandHoseLogUITests
    archive:
      config: Release
